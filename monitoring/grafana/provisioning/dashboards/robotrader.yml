# Configuração de Provisionamento de Dashboards - RoboTrader 2.0
apiVersion: 1

providers:
  - name: 'RoboTrader Dashboards'
    orgId: 1
    folder: 'RoboTrader'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards

