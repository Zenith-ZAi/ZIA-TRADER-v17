version: '3.8'

services:
  # Aplicação Principal ZIA Trader
  zia-app:
    build: .
    container_name: zia-trader-app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@db:5432/zia_trader_db
      - REDIS_URL=redis://redis:6379/0
      - KAFKA_SERVERS=kafka:9092
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_SECRET_KEY=${BINANCE_SECRET_KEY}
      - POLYGON_API_KEY=${POLYGON_API_KEY}
    depends_on:
      - db
      - redis
      - kafka
    restart: always

  # Banco de Dados PostgreSQL
  db:
    image: postgres:13-alpine
    container_name: zia-postgres
    environment:
      POSTGRES_DB: zia_trader_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # Cache Redis para estado em tempo real
  redis:
    image: redis:alpine
    container_name: zia-redis
    ports:
      - "6379:6379"
    restart: always

  # Zookeeper para coordenação do Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zia-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # Kafka para processamento de mensagens assíncronas
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: zia-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

volumes:
  postgres_data:

networks:
  default:
    name: zia-network
